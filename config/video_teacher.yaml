experiment:
  name: wimans_5g_single_video_teacher
  seed: 39
  output_dir: output

data:
  root: ../dataset
  annotation: ../dataset/annotation.csv
  wifi_band: ["5"]
  environment: ["classroom", "meeting_room", "empty_room"]
  num_users: ["1"]
  label_mode: single_ce
  sample_limit: null
  test_size: 0.2

video:
  online_read: true
  num_frames: 90

video_teacher:
  mode: classifier
  # WiMANS-style choices: S3D, ResNet, MViT-v1, MViT-v2, Swin-T, Swin-S.
  # Torchvision choices also work: s3d, r3d_18, mc3_18, r2plus1d_18,
  # mvit_v1_b, mvit_v2_s, swin3d_t, swin3d_s, swin3d_b.
  backbone: s3d
  weights: kinetics400
  checkpoint: null
  freeze_backbone: false
  freeze_video_teacher: true
  dropout: 0.2
  num_classes: 9

video_projector:
  hidden_dim: 256
  out_dim: 256
  num_heads: 2

train:
  epochs: 20
  # S3D with 90 frames can exceed 16 GB VRAM at batch_size=8.
  # Keep online mp4 loading, use micro-batch 4 and accumulate 4 steps for effective batch 16.
  batch_size: 4
  gradient_accumulation_steps: 4
  keep_top_k: 3
  num_workers: 0
  log_interval: 10
  lr_backbone: 1.0e-5
  lr_head: 1.0e-4
  weight_decay: 1.0e-4
  amp: true
  device: auto
  grad_clip_norm: 5.0
  scheduler:
    factor: 0.5
    patience: 5
    min_lr: 1.0e-7

logging:
  compute_flops: true
  flops_video_frames: 16
