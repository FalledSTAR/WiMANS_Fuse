experiment:
  name: wimans_5g_single_baseline
  seed: 39
  output_dir: output

data:
  root: ../dataset
  annotation: ../dataset/annotation.csv
  wifi_band: ["5"]
  environment: null
  num_users: ["1"]
  user_mode: single
  label_mode: single_ce
  target_len: 3000
  pad_mode: left
  truncate_mode: tail
  normalize: log1p_zscore
  sample_limit: null
  test_size: 0.2

video:
  use_video: true
  online_read: true
  freeze_s3d: true
  s3d_weights: kinetics400
  num_frames: 90

model:
  wifi_backbone: xfi_resnet18
  xfi_weight_path: ../backbone_models/wifi_ResNet18.pt
  wifi_input_channels: 270
  num_classes: 9
  multi_user_slots: 6

projector:
  enable: true
  hidden_dim: 256
  out_dim: 256
  num_heads: 2

cafd:
  enable: true
  temperature: 0.1
  alpha: 1.0
  beta: 0.5
  lambda_cafd: 0.1

train:
  epochs: 1
  batch_size: 2
  num_workers: 0
  lr_backbone: 1.0e-5
  lr_head: 1.0e-4
  lr_projector: 1.0e-4
  weight_decay: 1.0e-4
  amp: false
  device: auto

test:
  checkpoint: null
  threshold: 0.5
