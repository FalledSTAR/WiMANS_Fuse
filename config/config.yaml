experiment:
  name: wimans_5g_single_baseline
  seed: 39
  output_dir: output

data:
  root: ../dataset
  annotation: ../dataset/annotation.csv
  wifi_band: ["5"]
  environment: ["classroom", "meeting_room", "empty_room"]
  num_users: ["1"]
  user_mode: single
  label_mode: single_ce
  target_len: 3000
  pad_mode: left
  truncate_mode: tail
  normalize: log1p_zscore
  sample_limit: null
  test_size: 0.2

video:
  use_video: true
  online_read: true
  freeze_s3d: true
  s3d_weights: kinetics400
  teacher_checkpoint: ../backbone_models/video/video_s3d.pt
  num_frames: 90

model:
  wifi_backbone: xfi_resnet18
  xfi_weight_path: ../backbone_models/WiFi/wifi_ResNet18.pt
  wifi_input_channels: 270
  num_classes: 9
  multi_user_slots: 6

projector:
  enable: true
  hidden_dim: 256
  out_dim: 256
  num_heads: 2

cafd:
  enable: true
  temperature: 0.1
  alpha: 1.0
  beta: 0.5
  lambda_cafd: 0.1

logits_kd:
  enable: true
  temperature: 4.0
  lambda_logits: 0.5
  confidence_threshold: 0.0

train:
  epochs: 25
  batch_size: 8
  num_workers: 0
  log_interval: 50
  lr_backbone: 1.0e-5
  lr_head: 1.0e-4
  lr_projector: 1.0e-4
  weight_decay: 1.0e-4
  amp: false
  device: auto
  scheduler:
    factor: 0.5      # multiply LR by this when plateau detected
    patience: 5      # epochs with no val_acc improvement before reducing
    min_lr: 1.0e-7   # floor for all param group LRs

test:
  checkpoint: null
  threshold: 0.5

logging:
  compute_flops: true
  flops_video_frames: 16
